name = "scrubinbox"
main = "worker/index.ts"
compatibility_date = "2026-06-22"
compatibility_flags = ["nodejs_compat"]

# Workers + Assets: this Worker serves both the SPA (built into ./dist/client
# by Vite via @cloudflare/vite-plugin) and the /api/* routes.
# `run_worker_first = true` invokes the Worker for every request — it routes
# /api/* to Hono handlers and falls through to env.ASSETS for everything else.
[assets]
directory = "./dist/client"
binding = "ASSETS"
run_worker_first = true
# SPA fallback: any path the assets binding doesn't know about (e.g. /welcome,
# any client-side route) returns index.html so the Svelte app can inspect
# window.location.pathname and render the right view.
not_found_handling = "single-page-application"

# Local-dev secrets live in .dev.vars (gitignored).
#
# Required per-env secrets (set via `wrangler secret put --env {staging,production}`;
# in .dev.vars for local dev):
#   SUPABASE_URL                public API URL of the linked Supabase project
#   SUPABASE_PUBLISHABLE_KEY    public key (formerly "anon"); used for JWT
#                               verification path. Supabase migrated to the
#                               `sb_publishable_...` format; legacy `eyJ...`
#                               anon JWTs still work but are being deprecated
#   SUPABASE_SECRET_KEY         admin key (formerly "service_role"); bypasses
#                               RLS — Stripe webhook handler only. New-format
#                               value is `sb_secret_...`
#   STRIPE_SECRET_KEY           test-mode `sk_test_...` or live-mode `sk_live_...`
#   STRIPE_WEBHOOK_SECRET       `whsec_...` from the endpoint registration in the
#                               Stripe dashboard (Developers → Webhooks)
#   STRIPE_PRICE_ID             the Checkout `line_items[0].price` id

# --- Environments ---
#
# Deploy targets: `wrangler deploy --env staging` and `--env production`.
# Each becomes a separate Worker on Cloudflare — `scrubinbox-staging` gets the
# auto-assigned `*.workers.dev` URL; `scrubinbox` (production) is fronted by
# `app.scrubinbox.com` via a `cloudflare_workers_custom_domain` in scrubinbox-infra.
#
# Secrets are per-environment; use `wrangler secret put --env staging <NAME>`.

[env.staging]
name = "scrubinbox-staging"

[env.production]
name = "scrubinbox"
