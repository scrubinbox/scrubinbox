# Dependabot config — auto-opens PRs for outdated / vulnerable dependencies.
#
# Scoped to weekly to keep noise low for a small team of one. Security-relevant
# updates (any severity) fire regardless of schedule — GitHub's automatic
# security-update feature is separate and always on.

version: 2
updates:
  # npm — the app's runtime + dev deps
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"
      include: "scope"
    # Group non-security patch + minor updates into one PR per week to avoid
    # a flood of tiny bumps. Security updates stay individual so they get
    # reviewed on their own merits.
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    # Major-version ignores where our ecosystem can't take the bump yet.
    # Revisit each entry periodically; delete when the upstream plugin
    # supports the new major.
    ignore:
      # vite ↔ @sveltejs/vite-plugin-svelte move in lockstep. vite 8 requires
      # vite-plugin-svelte 7, and vite-plugin-svelte 7 requires vite 8 —
      # chicken-and-egg from Dependabot's perspective. When both are ready
      # we bump them together in a manual PR.
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@sveltejs/vite-plugin-svelte"
        update-types: ["version-update:semver-major"]

  # GitHub Actions used by ci.yml + release.yml — pin at major-tag level, but
  # let Dependabot bump to newer majors when they release.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci"
