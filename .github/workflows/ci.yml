name: CI

# CI runs on every PR and every push to main.
# On push to main we additionally deploy to the staging Worker
# (scrubinbox-staging.<account>.workers.dev).
# Production deploys live in release.yml and are triggered by SemVer tags.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Only one staging deploy from main at a time. Newer commits cancel an
# in-flight run so we don't ship an older bundle over a newer one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # 22+ required by @cloudflare/vite-plugin (node:module.registerHooks
          # was stabilised in 22.15). Any earlier and vite.config.js fails to
          # load, which crashes vitest before a single test runs.
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck worker
        run: npm run typecheck:worker

      - name: Run tests
        run: npm test

      - name: Build (CI check)
        # PRs and non-deploy runs only need to prove the build succeeds.
        # VITE_ vars can be dummies here — the build inlines them, but the
        # bundle is thrown away. Real values are injected on the deploy job.
        env:
          VITE_SUPABASE_URL: "https://ci-placeholder.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "ci-placeholder"
        run: npm run build

  deploy-staging:
    name: Deploy → staging
    needs: test
    # Only deploy when the push landed on main. PRs stop at `test`.
    # Also skips PRs from forks, which can't access environment secrets anyway.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    # Scopes the secrets below (CLOUDFLARE_*, VITE_SUPABASE_*) to the
    # `staging` GitHub Environment. Same plain names as production — the
    # environment binding is what selects the right values.
    environment:
      name: staging
      url: https://scrubinbox-staging.brian-e60.workers.dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (staging)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          # Version stamp: first 7 chars of the commit SHA, so the app footer
          # in staging shows which build is live.
          VITE_APP_VERSION: staging-${{ github.sha }}
        run: npm run build

      - name: Deploy Worker (staging)
        # -c wrangler.toml pins the root config; without it @cloudflare/vite-plugin
        # would redirect wrangler to dist/scrubinbox/wrangler.json which flattens
        # the [env.*] blocks and would deploy to the wrong Worker name.
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy -c wrangler.toml --env staging
