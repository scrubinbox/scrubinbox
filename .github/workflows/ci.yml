name: CI

# CI runs on every PR and every push to main.
# On push to main we additionally deploy to the staging Worker
# (scrubinbox-staging.<account>.workers.dev).
# Production deploys live in release.yml and are triggered by SemVer tags.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Only one staging deploy from main at a time. Newer commits cancel an
# in-flight run so we don't ship an older bundle over a newer one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # 22+ required by @cloudflare/vite-plugin (node:module.registerHooks
          # was stabilised in 22.15). Any earlier and vite.config.js fails to
          # load, which crashes vitest before a single test runs.
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability scan
        # Fails on any high or critical vulnerability in the tree. Moderate
        # and low don't block CI — Dependabot picks those up asynchronously.
        # Rationale: our sub-processor + ASVS L1 story assumes we don't ship
        # known-vulnerable code to prod; this is the build-time gate.
        run: npm audit --audit-level=high

      - name: Typecheck worker
        run: npm run typecheck:worker

      - name: Run tests
        run: npm test

      - name: Build (CI check)
        # PRs and non-deploy runs only need to prove the build succeeds. The
        # client no longer needs any VITE_ auth secrets (roll-own OAuth flow
        # runs entirely in the Worker) — nothing to inject here.
        run: npm run build

  deploy-staging:
    name: Deploy → staging
    needs: test
    # Only deploy when the push landed on main. PRs stop at `test`.
    # Also skips PRs from forks, which can't access environment secrets anyway.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    # Scopes CLOUDFLARE_* to the `staging` GitHub Environment. VITE_ auth
    # secrets are gone with the roll-own OAuth flow — no per-env build
    # secrets needed for the client bundle.
    environment:
      name: staging
      url: https://scrubinbox-staging.brian-e60.workers.dev

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (staging)
        env:
          # Version stamp: first 7 chars of the commit SHA, so the app footer
          # in staging shows which build is live.
          VITE_APP_VERSION: staging-${{ github.sha }}
        run: npm run build

      - name: Deploy Worker (staging)
        # -c wrangler.toml pins the root config; without it @cloudflare/vite-plugin
        # would redirect wrangler to dist/scrubinbox/wrangler.json which flattens
        # the [env.*] blocks and would deploy to the wrong Worker name.
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy -c wrangler.toml --env staging
