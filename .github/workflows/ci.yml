name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # 22+ required by @cloudflare/vite-plugin (node:module.registerHooks
          # was stabilised in 22.15). Any earlier and vite.config.js fails to
          # load, which crashes vitest before a single test runs.
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        env:
          VITE_GOOGLE_CLIENT_ID: "test-client-id"
        run: npm run build
